<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Summary Report — SMART Launch</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.3/build/fhir-client.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f3f5f9; color: #1a2436; }
    .box { text-align: center; }
    .spin { width: 34px; height: 34px; border: 3px solid #e3e8f0; border-top-color: #2563eb; border-radius: 50%; animation: s 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spin"></div>
    <div>Launching Summary Report from the EHR…</div>
  </div>
  <script>
    /* SMART on FHIR EHR launch entry point.
       Register this URL as the app's Launch URL in the Epic App Orchard /
       vendorservices.epic.com app registration. index.html is the redirect.

       Epic sandbox notes:
       - iss (sandbox R4): https://fhir.epic.com/interconnect-fhir-oauth/api/FHIR/R4
       - Replace clientId with your non-production client ID.               */
    FHIR.oauth2.authorize({
      clientId: 'REPLACE_WITH_EPIC_CLIENT_ID',
      scope: 'launch openid fhirUser patient/*.read',
      redirectUri: './index.html'
    });
  </script>
</body>
</html>
